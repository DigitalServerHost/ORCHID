# Unique project identifier in SonarQube
sonar.projectKey=ramnet-orchid
sonar.projectName=Project ORCHID
sonar.projectVersion=0.1.0
sonar.description=Operation-Role Coordination & Hedging Interface Daemon (RAMNET Core)

# Source paths to be scanned (covers Python, Go, C, and Bash scripts)
sonar.sources=locality,orchid,scheduler,scripts

# Source character encoding
sonar.sourceEncoding=UTF-8

# Exclude virtual environments, build objects,Timing timing evidence logs, and generated raw assembly
sonar.exclusions=**/build/**,**/evidence/**,**/*.S,**/*.plan,**/.venv/**,**/go.mod,**/go.sum

# Language specific configurations
sonar.python.version=3.10
sonar.go.exclusions=**/*_test.go
